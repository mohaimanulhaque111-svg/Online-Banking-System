<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank — Digital Finance Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #00d4aa;
    --accent2: #4f8ef7;
    --accent3: #f59e0b;
    --danger: #ef4444;
    --text: #e8edf5;
    --text-muted: #6b7a99;
    --text-dim: #3d4d6a;
    --green: #10b981;
    --red: #ef4444;
    --gold: #f59e0b;
    --purple: #8b5cf6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

  /* ===== ANIMATED BG ===== */
  .bg-grid {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position:fixed; top:-200px; right:-200px; width:600px; height:600px;
    background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation: glow-pulse 8s ease-in-out infinite;
  }
  .bg-glow2 {
    position:fixed; bottom:-200px; left:-100px; width:500px; height:500px;
    background: radial-gradient(circle, rgba(79,142,247,0.05) 0%, transparent 70%);
    pointer-events:none; z-index:0;
    animation: glow-pulse 10s ease-in-out infinite reverse;
  }
  @keyframes glow-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ===== PAGE SYSTEM ===== */
  .page { display:none; min-height:100vh; position:relative; z-index:1; }
  .page.active { display:flex; }

  /* ===== LOGIN ===== */
  #loginPage {
    align-items:center; justify-content:center; padding:20px;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .login-card {
    width:100%; max-width:440px;
    background: linear-gradient(135deg, rgba(17,24,39,0.95), rgba(26,34,53,0.9));
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 40px;
    backdrop-filter:blur(20px);
    box-shadow: 0 0 0 1px rgba(0,212,170,0.05), 0 40px 80px rgba(0,0,0,0.5);
    position:relative; overflow:hidden;
  }
  .login-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .logo-area { text-align:center; margin-bottom:40px; }
  .logo-icon {
    width:64px; height:64px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:18px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
    font-size:28px; box-shadow:0 8px 32px rgba(0,212,170,0.3);
  }
  .logo-name { font-family:'DM Serif Display',serif; font-size:32px; letter-spacing:-0.5px; }
  .logo-name span { color:var(--accent); }
  .logo-sub { color:var(--text-muted); font-size:13px; margin-top:4px; letter-spacing:1.5px; text-transform:uppercase; }

  .form-group { margin-bottom:20px; }
  .form-label { display:block; font-size:12px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .form-input {
    width:100%; padding:14px 16px; background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:15px;
    transition:all 0.2s;
  }
  .form-input:focus { outline:none; border-color:var(--accent); background:rgba(0,212,170,0.04); box-shadow:0 0 0 3px rgba(0,212,170,0.1); }

  .role-select-group { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:24px; }
  .role-btn {
    padding:10px 8px; border:1px solid var(--border); border-radius:10px;
    background:transparent; color:var(--text-muted); font-size:12px; font-weight:500;
    cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .role-btn.active { border-color:var(--accent); background:rgba(0,212,170,0.1); color:var(--accent); }
  .role-btn:hover:not(.active) { border-color:var(--text-dim); color:var(--text); }

  .btn-primary {
    width:100%; padding:16px; background:linear-gradient(135deg,var(--accent),#00b894);
    border:none; border-radius:12px; color:#0a0e1a; font-weight:700; font-size:15px;
    cursor:pointer; transition:all 0.2s; letter-spacing:0.3px;
    font-family:'DM Sans',sans-serif;
  }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,212,170,0.35); }
  .btn-primary:active { transform:translateY(0); }

  .login-hint { text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted); }
  .login-hint code { font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:12px; }

  .error-msg { color:var(--danger); font-size:13px; text-align:center; margin-top:12px; display:none; }

  /* ===== APP SHELL ===== */
  #appPage { flex-direction:row; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width:260px; min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
    overflow-y:auto;
    flex-shrink:0;
  }
  .sidebar-logo {
    padding:28px 24px 20px;
    border-bottom:1px solid var(--border);
  }
  .sidebar-logo-inner { display:flex; align-items:center; gap:12px; }
  .sidebar-logo-icon {
    width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px;
    flex-shrink:0;
  }
  .sidebar-logo-text { font-family:'DM Serif Display',serif; font-size:22px; }
  .sidebar-logo-text span { color:var(--accent); }

  .sidebar-role-badge {
    margin:16px 24px;
    padding:8px 12px; border-radius:8px; font-size:11px; font-weight:600;
    letter-spacing:0.8px; text-transform:uppercase; text-align:center;
  }
  .badge-customer { background:rgba(0,212,170,0.1); color:var(--accent); border:1px solid rgba(0,212,170,0.2); }
  .badge-admin { background:rgba(79,142,247,0.1); color:var(--accent2); border:1px solid rgba(79,142,247,0.2); }
  .badge-auditor { background:rgba(245,158,11,0.1); color:var(--gold); border:1px solid rgba(245,158,11,0.2); }
  .badge-support { background:rgba(139,92,246,0.1); color:var(--purple); border:1px solid rgba(139,92,246,0.2); }

  .sidebar-nav { padding:8px 12px; flex:1; }
  .nav-section-label {
    font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-dim); padding:12px 12px 6px;
  }
  .nav-item {
    display:flex; align-items:center; gap:12px; padding:10px 12px;
    border-radius:10px; cursor:pointer; transition:all 0.15s;
    color:var(--text-muted); font-size:14px; font-weight:500; margin-bottom:2px;
  }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .nav-item.active { background:rgba(0,212,170,0.1); color:var(--accent); }
  .nav-icon { width:18px; text-align:center; flex-shrink:0; }

  .sidebar-user {
    padding:16px 24px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .user-avatar {
    width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#0a0e1a;
    flex-shrink:0;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-id { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
  .logout-btn {
    width:28px; height:28px; border:none; background:transparent; cursor:pointer;
    color:var(--text-muted); font-size:16px; border-radius:6px; transition:all 0.15s;
    display:flex; align-items:center; justify-content:center;
  }
  .logout-btn:hover { background:rgba(239,68,68,0.1); color:var(--danger); }

  /* ===== MAIN CONTENT ===== */
  .main-content { flex:1; overflow-y:auto; min-height:100vh; }

  .content-panel { display:none; padding:32px; }
  .content-panel.active { display:block; animation: panelIn 0.3s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }

  .panel-header { margin-bottom:28px; }
  .panel-title { font-family:'DM Serif Display',serif; font-size:28px; margin-bottom:6px; }
  .panel-subtitle { color:var(--text-muted); font-size:14px; }

  /* ===== CARDS ===== */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px;
    transition:border-color 0.2s;
  }
  .card:hover { border-color:rgba(255,255,255,0.1); }
  .card-title { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:20px;
    position:relative; overflow:hidden;
  }
  .stat-card::after {
    content:''; position:absolute; right:-20px; top:-20px;
    width:80px; height:80px; border-radius:50%;
    opacity:0.07;
  }
  .stat-card.green::after { background:var(--green); }
  .stat-card.blue::after { background:var(--accent2); }
  .stat-card.gold::after { background:var(--gold); }
  .stat-card.purple::after { background:var(--purple); }
  .stat-label { font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .stat-value { font-family:'DM Serif Display',serif; font-size:28px; }
  .stat-value.green { color:var(--green); }
  .stat-value.blue { color:var(--accent2); }
  .stat-value.gold { color:var(--gold); }
  .stat-value.purple { color:var(--purple); }
  .stat-change { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .stat-icon { font-size:24px; margin-bottom:12px; }

  /* ===== BALANCE CARD ===== */
  .balance-card {
    background:linear-gradient(135deg,#0d2033,#0a1929,#0d1f3c);
    border:1px solid rgba(0,212,170,0.15);
    border-radius:20px; padding:28px 32px;
    position:relative; overflow:hidden; margin-bottom:24px;
  }
  .balance-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,212,170,0.12),transparent 70%);
  }
  .balance-card-label { font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(0,212,170,0.7); margin-bottom:8px; }
  .balance-amount { font-family:'DM Serif Display',serif; font-size:48px; color:#fff; }
  .balance-amount .cents { font-size:28px; color:rgba(255,255,255,0.6); }
  .balance-info { display:flex; gap:32px; margin-top:20px; }
  .balance-info-item { }
  .balance-info-label { font-size:11px; color:rgba(255,255,255,0.4); margin-bottom:3px; }
  .balance-info-value { font-size:14px; font-weight:600; font-family:'JetBrains Mono',monospace; }

  /* ===== TABLE ===== */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); padding:12px 16px; border-bottom:1px solid var(--border); }
  td { padding:14px 16px; font-size:14px; border-bottom:1px solid rgba(31,45,69,0.5); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .amount-positive { color:var(--green); font-family:'JetBrains Mono',monospace; font-weight:600; }
  .amount-negative { color:var(--red); font-family:'JetBrains Mono',monospace; font-weight:600; }

  .badge {
    display:inline-flex; align-items:center; padding:3px 10px;
    border-radius:6px; font-size:11px; font-weight:600; letter-spacing:0.3px;
  }
  .badge-success { background:rgba(16,185,129,0.12); color:var(--green); }
  .badge-warning { background:rgba(245,158,11,0.12); color:var(--gold); }
  .badge-danger { background:rgba(239,68,68,0.12); color:var(--red); }
  .badge-info { background:rgba(79,142,247,0.12); color:var(--accent2); }

  /* ===== FORMS ===== */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group-app { margin-bottom:18px; }
  .form-label-app { display:block; font-size:12px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:7px; }
  .form-input-app {
    width:100%; padding:12px 16px; background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:10px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:14px; transition:all 0.2s;
  }
  .form-input-app:focus { outline:none; border-color:var(--accent); background:rgba(0,212,170,0.04); box-shadow:0 0 0 3px rgba(0,212,170,0.1); }
  select.form-input-app { cursor:pointer; }
  select.form-input-app option { background:var(--surface); }

  .btn {
    padding:12px 24px; border:none; border-radius:10px; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
    transition:all 0.2s; display:inline-flex; align-items:center; gap:8px;
  }
  .btn-accent { background:linear-gradient(135deg,var(--accent),#00b894); color:#0a0e1a; }
  .btn-accent:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,212,170,0.3); }
  .btn-blue { background:linear-gradient(135deg,var(--accent2),#3b82f6); color:#fff; }
  .btn-blue:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,142,247,0.3); }
  .btn-danger { background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background:rgba(239,68,68,0.2); }
  .btn-ghost { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--text-muted); color:var(--text); }
  .btn-sm { padding:7px 14px; font-size:12px; }

  /* ===== TOAST ===== */
  #toast {
    position:fixed; bottom:32px; right:32px; z-index:1000;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:14px 20px; min-width:280px;
    display:none; align-items:center; gap:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .toast-icon { font-size:20px; }
  .toast-text { font-size:14px; font-weight:500; }
  #toast.success { border-color:rgba(16,185,129,0.3); }
  #toast.error { border-color:rgba(239,68,68,0.3); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.active { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:32px; width:100%; max-width:500px;
    animation: fadeIn 0.3s ease;
    position:relative;
  }
  .modal-title { font-family:'DM Serif Display',serif; font-size:24px; margin-bottom:20px; }
  .modal-close {
    position:absolute; top:16px; right:16px; width:32px; height:32px;
    background:transparent; border:1px solid var(--border); border-radius:8px;
    cursor:pointer; color:var(--text-muted); font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { background:rgba(255,255,255,0.05); color:var(--text); }

  /* ===== CHART BAR ===== */
  .mini-chart { display:flex; align-items:flex-end; gap:4px; height:60px; margin-top:16px; }
  .mini-bar { flex:1; border-radius:3px 3px 0 0; transition:height 0.5s ease; min-height:4px; }

  /* ===== FILTER ROW ===== */
  .filter-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }

  /* ===== PROFILE ===== */
  .profile-header {
    display:flex; align-items:center; gap:24px; padding:24px;
    background:var(--surface2); border-radius:16px; margin-bottom:24px;
    border:1px solid var(--border);
  }
  .profile-avatar-big {
    width:72px; height:72px; border-radius:18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-family:'DM Serif Display',serif; font-size:28px; color:#0a0e1a; flex-shrink:0;
  }
  .profile-name { font-family:'DM Serif Display',serif; font-size:24px; }
  .profile-meta { font-size:13px; color:var(--text-muted); margin-top:4px; }
  .profile-tags { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

  /* ===== AUDIT LOG ===== */
  .audit-entry { display:flex; gap:16px; padding:14px 0; border-bottom:1px solid rgba(31,45,69,0.5); }
  .audit-dot { width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; }
  .audit-time { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-muted); }
  .audit-action { font-size:14px; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:768px){
    .sidebar { width:60px; }
    .sidebar-logo-text, .nav-item span, .sidebar-role-badge, .user-info { display:none; }
    .sidebar-logo-inner { justify-content:center; }
    .sidebar-user { justify-content:center; }
    .nav-item { justify-content:center; padding:10px; }
    .content-panel { padding:16px; }
    .form-row { grid-template-columns:1fr; }
    .balance-amount { font-size:32px; }
    .stats-grid { grid-template-columns:1fr 1fr; }
  }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:900px){ .two-col { grid-template-columns:1fr; } }

  .divider { height:1px; background:var(--border); margin:20px 0; }

  .text-mono { font-family:'JetBrains Mono',monospace; font-size:13px; }
  .text-muted { color:var(--text-muted); }
  .flex-between { display:flex; align-items:center; justify-content:space-between; }

  .transfer-step { display:none; }
  .transfer-step.active { display:block; }

  .confirm-box {
    background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:20px; margin:16px 0;
  }
  .confirm-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
  .confirm-row:not(:last-child) { border-bottom:1px solid rgba(31,45,69,0.5); }

  .search-input {
    padding:10px 16px; background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:10px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:14px; width:220px;
  }
  .search-input:focus { outline:none; border-color:var(--accent); }

  .account-status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
  .dot-green { background:var(--green); box-shadow:0 0 6px var(--green); }
  .dot-red { background:var(--red); }
  .dot-yellow { background:var(--gold); }

  .analytics-bar-chart { margin-top:16px; }
  .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .bar-label { font-size:12px; color:var(--text-muted); width:100px; flex-shrink:0; text-align:right; }
  .bar-track { flex:1; height:10px; background:rgba(255,255,255,0.05); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width 1s ease; }
  .bar-val { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--text-muted); width:70px; }

  .compliance-tag {
    display:inline-flex; align-items:center; gap:6px; padding:4px 12px;
    border-radius:6px; font-size:11px; font-weight:700; letter-spacing:0.5px;
    background:rgba(16,185,129,0.1); color:var(--green); border:1px solid rgba(16,185,129,0.2);
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

function selectRole(btn, role) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));

function doLogin() {

    document.getElementById('loginPage').classList.remove('active');

  } else {
    document.getElementById('loginError').style.display='block';
    document.getElementById('loginPassword').style.borderColor='var(--danger)';
  }
}

  document.getElementById('appPage').classList.remove('active');
  document.getElementById('loginPage').classList.add('active');

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const items = NAV[currentRole];
  nav.innerHTML = '<div class="nav-section-label">Navigation</div>';
  items.forEach(item => {
    nav.innerHTML += `<div class="nav-item" id="nav-${item.id}" onclick="showPanel('${item.id}')">
      <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
    </div>`;
  });
  showPanel(items[0].id);
}

function showPanel(id) {
  currentPanel = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-'+id);
  if(nav) nav.classList.add('active');

  const main = document.getElementById('mainContent');
  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));

  let el = document.getElementById('panel-'+id);
  if(!el) {
    el = document.createElement('div');
    el.className='content-panel active';
    el.id='panel-'+id;
    el.innerHTML = buildPanel(id);
    main.appendChild(el);
    setTimeout(()=>initPanel(id),50);
  } else {
    el.classList.add('active');
    initPanel(id);
  }
}

// ===================== PANEL BUILDER =====================
function buildPanel(id) {
  switch(id) {
    case 'dashboard': return buildCustomerDash();
    case 'transfer': return buildTransfer();
    case 'history': return buildHistory();
    case 'statements': return buildStatements();
    case 'profile': return buildProfile();
    case 'adashboard': return buildAdminDash();
    case 'accounts': return buildAccounts();
    case 'pendingTx': return buildPendingTx();
    case 'fraud': return buildFraud();
    case 'analytics': return buildAnalytics();
    case 'alogsPanel': return buildAuditLogs();
    case 'compliance': return buildCompliance();
    case 'reportGen': return buildReportGen();
    default: return '<div class="content-panel"><p>Panel not found.</p></div>';
  }
}

function initPanel(id) {
  if(id==='history') renderTxnTable(txnList);

function txNext() {
  const rec = document.getElementById('txRecipient').value;
  const amt = parseFloat(document.getElementById('txAmount').value);
  const note = document.getElementById('txNote').value || 'N/A';
  const type = document.getElementById('txType').value;
  if(!rec){ showToast('Please select a recipient', 'error'); return; }
  if(!amt||amt<=0){ showToast('Enter a valid amount', 'error'); return; }
  if(amt>userBalance){ showToast('Insufficient balance!', 'error'); return; }
  const recName = document.getElementById('txRecipient').selectedOptions[0].text.split('—')[1].trim();
  document.getElementById('txConfirmBox').innerHTML = `
    <div class="confirm-row"><span class="text-muted">From</span><span class="text-mono">ACC-2354934</span></div>
    <div class="confirm-row"><span class="text-muted">To</span><span class="text-mono">${rec}</span></div>
    <div class="confirm-row"><span class="text-muted">Recipient</span><span>${recName}</span></div>
    <div class="confirm-row"><span class="text-muted">Amount</span><span style="color:var(--accent);font-weight:700">৳ ${amt.toLocaleString()}</span></div>
    <div class="confirm-row"><span class="text-muted">Note</span><span>${note}</span></div>
    <div class="confirm-row"><span class="text-muted">Type</span><span>${type}</span></div>
    <div class="confirm-row"><span class="text-muted">After Balance</span><span style="color:var(--green)">৳ ${fmt(userBalance-amt)}</span></div>`;
  document.getElementById('txStep1').classList.remove('active');
  document.getElementById('txStep2').classList.add('active');
}
function txBack() {
  document.getElementById('txStep2').classList.remove('active');
  document.getElementById('txStep1').classList.add('active');
}
function txConfirm() {
  const amt = parseFloat(document.getElementById('txAmount').value);
  const rec = document.getElementById('txRecipient').value;
  const note = document.getElementById('txNote').value || 'Fund Transfer';
  const recName = document.getElementById('txRecipient').selectedOptions[0].text.split('—')[1].trim();
  userBalance -= amt;
  const txId = 'TXN'+String(txnList.length+1).padStart(3,'0');
  txnList.unshift({ id:txId, date:new Date().toISOString().slice(0,10), desc:`Transfer to ${recName}`, type:'Debit', amount:-amt, status:'Completed', account:'ACC-2354934' });
  const receipt = `<div class="confirm-row"><span class="text-muted">Transaction ID</span><span class="text-mono" style="color:var(--accent)">${txId}</span></div>
    <div class="confirm-row"><span class="text-muted">Amount Debited</span><span style="color:var(--red);font-weight:700">৳ ${amt.toLocaleString()}</span></div>
    <div class="confirm-row"><span class="text-muted">New Balance</span><span style="color:var(--green)">৳ ${fmt(userBalance)}</span></div>
    <div class="confirm-row"><span class="text-muted">Timestamp</span><span class="text-mono">${new Date().toLocaleString()}</span></div>`;
  document.getElementById('txReceiptBox').innerHTML = receipt;
  document.getElementById('txStep2').classList.remove('active');
  document.getElementById('txStep3').classList.add('active');
  showToast('Transfer completed successfully!', 'success');
}
function txReset() {
  document.getElementById('txStep3').classList.remove('active');
  document.getElementById('txStep1').classList.add('active');
  document.getElementById('txRecipient').value='';
  document.getElementById('txAmount').value='';
  document.getElementById('txNote').value='';
  document.getElementById('txBalanceDisplay').textContent='৳ '+fmt(userBalance);
}

  return `

    <div class="panel-title">Transaction History</div>
    <div class="panel-subtitle">Complete record of all your account activities</div>
  </div>
  <div class="filter-row">
    <input class="search-input" id="txSearch" placeholder="🔍 Search transactions..." oninput="filterTx()" />
    <select class="form-input-app" style="width:160px" id="txTypeFilter" onchange="filterTx()">
      <option value="">All Types</option>
      <option value="Credit">Credit</option>
      <option value="Debit">Debit</option>
    </select>
    <select class="form-input-app" style="width:160px" id="txStatusFilter" onchange="filterTx()">
      <option value="">All Status</option>
      <option value="Completed">Completed</option>
      <option value="Pending">Pending</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="filterTx()">Filter</button>
  </div>
  <div class="card">
    <div class="table-wrap" id="txTableWrap"></div>
  </div>`;
}

function renderTxnTable(data) {
  const wrap = document.getElementById('txTableWrap');
  if(!wrap) return;
  if(!data.length) { wrap.innerHTML='<p style="padding:20px;color:var(--text-muted)">No transactions found.</p>'; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>ID</th><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody>${data.map(t=>`<tr>
      <td class="text-mono" style="font-size:12px">${t.id}</td>
      <td style="font-size:13px;color:var(--text-muted)">${t.date}</td>
      <td>${t.desc}</td>
      <td><span class="badge ${t.type==='Credit'?'badge-success':'badge-danger'}">${t.type}</span></td>
      <td class="${t.amount>0?'amount-positive':'amount-negative'}">${t.amount>0?'+':''}৳${Math.abs(t.amount).toLocaleString()}</td>
      <td><span class="badge badge-success">${t.status}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function filterTx() {
  const q = (document.getElementById('txSearch')||{}).value?.toLowerCase()||'';
  const tp = (document.getElementById('txTypeFilter')||{}).value||'';
  const st = (document.getElementById('txStatusFilter')||{}).value||'';
  let data = txnList.filter(t=>{
    const matchQ = !q || t.desc.toLowerCase().includes(q) || t.id.toLowerCase().includes(q);
    const matchT = !tp || t.type===tp;
    const matchS = !st || t.status===st;
    return matchQ && matchT && matchS;
  });
  renderTxnTable(data);
}

function previewStatement() {
  const from = document.getElementById('stFrom').value;
  const to = document.getElementById('stTo').value;
  const type = document.getElementById('stType').value;
  let filtered = txnList.filter(t => t.date>=from && t.date<=to && (!type||t.type===type));
  const totalCredit = filtered.filter(t=>t.amount>0).reduce((a,b)=>a+b.amount,0);
  const totalDebit = filtered.filter(t=>t.amount<0).reduce((a,b)=>a+Math.abs(b.amount),0);
  const preview = document.getElementById('stPreview');
  preview.innerHTML = `<div class="card-title">Statement Preview</div>
    <div class="confirm-box">
      <div class="confirm-row"><span class="text-muted">Account</span><span class="text-mono">ACC-2354934</span></div>
      <div class="confirm-row"><span class="text-muted">Period</span><span>${from} → ${to}</span></div>
      <div class="confirm-row"><span class="text-muted">Transactions</span><span>${filtered.length}</span></div>
      <div class="confirm-row"><span class="text-muted">Total Credits</span><span class="amount-positive">+৳${totalCredit.toLocaleString()}</span></div>
      <div class="confirm-row"><span class="text-muted">Total Debits</span><span class="amount-negative">-৳${totalDebit.toLocaleString()}</span></div>
      <div class="confirm-row"><span class="text-muted">Net</span><span style="font-weight:700">৳${(totalCredit-totalDebit).toLocaleString()}</span></div>
    </div>
    <div class="table-wrap" style="margin-top:16px"><table>
      <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
      <tbody>${filtered.map(t=>`<tr>
        <td style="font-size:12px">${t.date}</td>
        <td>${t.desc}</td>
        <td class="${t.amount>0?'amount-positive':'amount-negative'}">${t.amount>0?'+':''}৳${Math.abs(t.amount).toLocaleString()}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function generateStatement() {
  previewStatement();
  setTimeout(()=>showToast('Statement ready for download', 'success'), 300);
}

function renderAccountTable(data) {
  const wrap = document.getElementById('accTableWrap');
  if(!wrap) return;
  wrap.innerHTML = `<table>
    <thead><tr><th>Account ID</th><th>Name</th><th>Type</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${data.map(a=>`<tr>
      <td class="text-mono" style="font-size:12px">${a.id}</td>
      <td>${a.name}</td>
      <td><span class="badge badge-info">${a.type}</span></td>
      <td class="text-mono" style="font-size:13px">৳${a.balance.toLocaleString()}</td>
      <td><span class="badge ${a.status==='Active'?'badge-success':a.status==='Suspended'?'badge-danger':'badge-warning'}">${a.status}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="editAccount('${a.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="toggleAccount('${a.id}')">${a.status==='Suspended'?'Activate':'Suspend'}</button>
      </td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function filterAccounts() {
  const q = document.getElementById('accSearch')?.value.toLowerCase()||'';
  const st = document.getElementById('accStatusFilter')?.value||'';
  let data = accountList.filter(a=>(!q||a.name.toLowerCase().includes(q)||a.id.toLowerCase().includes(q))&&(!st||a.status===st));
  renderAccountTable(data);
}

function editAccount(id) {
  const a = accountList.find(x=>x.id===id);
  showModal('editAccount', a);
}

function toggleAccount(id) {
  const idx = accountList.findIndex(x=>x.id===id);
  if(idx>=0) {
    accountList[idx].status = accountList[idx].status==='Suspended' ? 'Active' : 'Suspended';
    renderAccountTable(accountList);
    showToast('Account status updated', 'success');
  }
}

// ===================== MODAL =====================
function showModal(type, data) {
  const box = document.getElementById('modalContent');
  if(type==='newAccount') {
    box.innerHTML = `<div class="modal-title">Create New Account</div>
      <div class="form-group-app"><label class="form-label-app">Full Name</label><input class="form-input-app" id="mName" placeholder="Customer full name" /></div>
      <div class="form-group-app"><label class="form-label-app">Account Type</label><select class="form-input-app" id="mType"><option>Savings</option><option>Current</option></select></div>
      <div class="form-group-app"><label class="form-label-app">Initial Deposit (BDT)</label><input class="form-input-app" id="mDeposit" type="number" placeholder="Minimum ৳500" /></div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-accent" onclick="createAccount()">Create Account</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>`;
  } else if(type==='editAccount' && data) {
    box.innerHTML = `<div class="modal-title">Edit Account</div>
      <div style="margin-bottom:16px"><span class="text-mono" style="color:var(--accent)">${data.id}</span></div>
      <div class="form-group-app"><label class="form-label-app">Name</label><input class="form-input-app" id="editName" value="${data.name}" /></div>
      <div class="form-group-app"><label class="form-label-app">Account Type</label><select class="form-input-app" id="editType"><option ${data.type==='Savings'?'selected':''}>Savings</option><option ${data.type==='Current'?'selected':''}>Current</option></select></div>
      <div class="form-group-app"><label class="form-label-app">Status</label><select class="form-input-app" id="editStatus">
        <option ${data.status==='Active'?'selected':''}>Active</option>
        <option ${data.status==='Suspended'?'selected':''}>Suspended</option>
        <option ${data.status==='Pending'?'selected':''}>Pending</option>
      </select></div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-accent" onclick="saveAccount('${data.id}')">Save Changes</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>`;
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

function createAccount() {
  const name = document.getElementById('mName').value.trim();
  const type = document.getElementById('mType').value;
  const dep = parseFloat(document.getElementById('mDeposit').value)||0;
  if(!name) { showToast('Please enter account holder name', 'error'); return; }
  if(dep<500) { showToast('Minimum initial deposit is ৳500', 'error'); return; }
  const newId = 'ACC-'+Math.floor(Math.random()*9000000+1000000);
  accountList.push({ id:newId, name, type, balance:dep, status:'Pending', joined:new Date().toISOString().slice(0,10) });
  closeModal();
  showToast(`Account ${newId} created successfully`, 'success');
  if(currentPanel==='accounts') renderAccountTable(accountList);
}

function saveAccount(id) {
  const idx = accountList.findIndex(x=>x.id===id);
  if(idx>=0) {
    accountList[idx].name = document.getElementById('editName').value;
    accountList[idx].type = document.getElementById('editType').value;
    accountList[idx].status = document.getElementById('editStatus').value;
    closeModal();
    showToast('Account updated successfully', 'success');
    if(currentPanel==='accounts') renderAccountTable(accountList);
  }
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  document.getElementById('toastIcon').textContent = type==='success'?'✅':'❌';
  t.className = type;
  t.style.display='flex';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, 3500);
}

// ===================== UTILS =====================
function fmt(n) { return n.toLocaleString('en-BD',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// Enter key on login
document.getElementById('loginUsername').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginPassword').focus(); });
</script>
